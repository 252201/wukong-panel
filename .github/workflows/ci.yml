name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: go test -race ./...
      - run: go vet ./...
      - run: sh -n install.sh uninstall.sh compat/deploy-hy2.sh
      - run: sh scripts/test-install-acme-status.sh
      - run: sh scripts/test-install-actions.sh
      - run: sh scripts/test-singbox-lifecycle.sh
      - run: |
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -o /tmp/wukong-$arch ./cmd/wukong-panel
          done

  installer-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [debian:12, ubuntu:24.04, rockylinux:9, almalinux:9, alpine:3.21]
    steps:
      - uses: actions/checkout@v4
      - name: Validate installer syntax in target image
        run: |
          docker run --rm -v "$PWD:/src:ro" "${{ matrix.image }}" sh -c '
            sh -n /src/install.sh /src/uninstall.sh
            if sh /src/install.sh --action invalid >/tmp/invalid.log 2>&1; then exit 1; fi
            grep -q -- "--action 必须是" /tmp/invalid.log
            if sh /src/install.sh --update --unattended >/tmp/update.log 2>&1; then exit 1; fi
            grep -q "未检测到已安装" /tmp/update.log
            if sh /src/install.sh --update-sing-box --unattended >/tmp/singbox.log 2>&1; then exit 1; fi
            grep -q "未检测到已安装" /tmp/singbox.log
          '
