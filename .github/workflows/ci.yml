name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: go test -race ./...
      - name: Verify generated protocol configs with official sing-box
        env:
          SING_BOX_VERSION: "1.13.14"
          SING_BOX_SHA256: f48703461a15476951ac4967cdad339d986f4b8096b4eb3ff0829a500502d697
        run: |
          archive="sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          curl -fL --retry 3 -o "/tmp/${archive}" "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${archive}"
          printf '%s  %s\n' "$SING_BOX_SHA256" "/tmp/${archive}" | sha256sum -c -
          tar -xzf "/tmp/${archive}" -C /tmp
          SING_BOX_TEST_BIN="/tmp/sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" \
            go test -run '^(TestGeneratedConfigsPassRealSingBoxCheck|TestGeneratedVLESSRealityCompletesFullRoundTrip|TestGeneratedAnyTLSCompletesFullRoundTrip|TestGeneratedProbesPassRealSingBoxCheck)$' -v ./internal/agent ./internal/singboxconfig
      - run: go vet ./...
      - run: sh -n install.sh uninstall.sh compat/deploy-hy2.sh
      - run: sh scripts/test-install-acme-status.sh
      - run: sh scripts/test-install-actions.sh
      - run: sh scripts/test-singbox-lifecycle.sh
      - run: |
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -o /tmp/wukong-$arch ./cmd/wukong-panel
          done

  installer-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [debian:12, ubuntu:24.04, rockylinux:9, almalinux:9, alpine:3.21]
    steps:
      - uses: actions/checkout@v4
      - name: Validate installer syntax in target image
        run: |
          docker run --rm -v "$PWD:/src:ro" "${{ matrix.image }}" sh -c '
            sh -n /src/install.sh /src/uninstall.sh
            if sh /src/install.sh --action invalid >/tmp/invalid.log 2>&1; then exit 1; fi
            grep -q -- "--action 必须是" /tmp/invalid.log
            if sh /src/install.sh --update --unattended >/tmp/update.log 2>&1; then exit 1; fi
            grep -q "未检测到已安装" /tmp/update.log
            if sh /src/install.sh --update-sing-box --unattended >/tmp/singbox.log 2>&1; then exit 1; fi
            grep -q "未检测到已安装" /tmp/singbox.log
            if sh /src/install.sh --uninstall-sing-box --unattended >/tmp/singbox-uninstall.log 2>&1; then exit 1; fi
            grep -q "未检测到已安装" /tmp/singbox-uninstall.log
          '
